<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Practice Sets</title>
<style>
  body { margin: 0; padding: 1.5rem; font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; }
  h2 { margin: 0 0 1rem; font-size: 20px; font-weight: 600; }
  .set-list { list-style: none; padding: 0; margin: 0 0 1rem; }
  .set-list li {
    padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px;
    margin-bottom: 6px; cursor: pointer; font-size: 15px;
    transition: background 0.1s;
  }
  .set-list li:hover { background: #f5f5f5; }
  .set-list li.selected { background: #e8f0fe; border-color: #a0b4f0; color: #1a56db; font-weight: 500; }
  .btn { padding: 8px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .empty { color: #888; font-size: 14px; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
  <h2>Practice Sets</h2>
  <ul class="set-list" id="setList"></ul>
  <div id="empty" class="empty" style="display:none">No practice sets found in practiceSets/</div>
  <button class="btn btn-primary" id="openBtn" disabled>Open</button>

<script>
  let selected = null;

  async function loadList() {
    const sets = await window.api.listSets();
    const list = document.getElementById('setList');
    const empty = document.getElementById('empty');
    const openBtn = document.getElementById('openBtn');
    list.innerHTML = '';
    selected = null;
    openBtn.disabled = true;

    if (sets.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    for (const s of sets) {
      const li = document.createElement('li');
      li.textContent = s.name;
      li.dataset.path = s.path;
      li.addEventListener('click', () => {
        document.querySelectorAll('.set-list li').forEach(el => el.classList.remove('selected'));
        li.classList.add('selected');
        selected = s.path;
        openBtn.disabled = false;
      });
      li.addEventListener('dblclick', () => {
        window.api.openSet(s.path);
      });
      list.appendChild(li);
    }
  }

  document.getElementById('openBtn').addEventListener('click', () => {
    if (selected) window.api.openSet(selected);
  });

  loadList();
</script>
</body>
</html>
