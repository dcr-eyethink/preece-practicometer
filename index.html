<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preece Practicometer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; display: flex; overflow: hidden; height: 100vh; }

  /* ---- Metronome (left) ---- */
  .metro-panel { width: 340px; min-width: 340px; padding: 1.5rem 1rem; overflow-y: auto; border-right: 1px solid #e0e0e0; flex-shrink: 0; }
  .beat-row { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 2rem; height: 56px; }
  .beat-dot { border-radius: 50%; transition: background 0.05s ease, box-shadow 0.05s ease; flex-shrink: 0; }
  .beat-dot.accent       { width: 36px; height: 36px; background: #1a4a8a; }
  .beat-dot.normal       { width: 24px; height: 24px; background: #1a4a8a; }
  .beat-dot.lit-accent   { width: 36px; height: 36px; background: #1565ff; box-shadow: 0 0 20px 8px rgba(30,120,255,0.55); }
  .beat-dot.lit-normal   { width: 24px; height: 24px; background: #3b8bff; box-shadow: 0 0 12px 4px rgba(60,140,255,0.45); }
  .bpm-display { text-align: center; margin-bottom: 1.5rem; }
  .bpm-num { font-size: 52px; font-weight: 500; line-height: 1; }
  .bpm-label { font-size: 14px; color: #888; margin-top: 2px; }
  .bpm-input { width: 80px; font-size: 20px; text-align: center; border: 1px solid #ccc; border-radius: 8px; padding: 4px 8px; background: #f9f9f9; margin-top: 8px; }
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .slider-label { font-size: 12px; color: #888; min-width: 28px; }
  .slider-row input[type=range], .vol-row input[type=range] { flex: 1; }
  .vol-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .vol-icon { font-size: 18px; color: #888; }
  .time-sig-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5rem; }
  .time-btn { padding: 6px 18px; border: 1px solid #ccc; border-radius: 8px; background: #f9f9f9; color: #555; font-size: 15px; cursor: pointer; }
  .time-btn.active { background: #e8f0fe; color: #1a56db; border-color: #a0b4f0; font-weight: 500; }
  .metro-divider { border: none; border-top: 1px solid #eee; margin: 0 0 1.5rem; }
  .metro-actions { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 1.5rem; }
  .adj-btn { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; color: #fff; }
  .adj-btn:active { transform: scale(0.93); }
  .adj-btn.minus { background: #c0392b; }
  .adj-btn.plus  { background: #27ae60; }
  .play-btn { padding: 10px 30px; border-radius: 24px; border: none; font-size: 16px; font-weight: 500; cursor: pointer; background: #1a1a1a; color: #fff; }
  .play-btn:hover { opacity: 0.85; }

  /* ---- Right side: sets list OR editor ---- */
  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Sets list */
  .sets-panel { padding: 1.5rem; overflow-y: auto; flex: 1; max-width: 280px; }
  .sets-panel h2 { margin: 0 0 1rem; font-size: 20px; font-weight: 600; }
  .set-list { list-style: none; padding: 0; margin: 0 0 1rem; }
  .set-list li { padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 6px; cursor: pointer; font-size: 15px; transition: background 0.1s; }
  .set-list li:hover { background: #f5f5f5; }
  .set-list li.selected { background: #e8f0fe; border-color: #a0b4f0; color: #1a56db; font-weight: 500; }
  .sets-empty { color: #888; font-size: 14px; padding: 2rem 0; text-align: center; }

  /* Editor */
  .editor-wrap { display: none; flex: 1; overflow: hidden; }
  .editor-wrap.active { display: flex; }
  .editor-panel { flex: 1; min-width: 380px; padding: 1.5rem; overflow-y: auto; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .btn { padding: 7px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; cursor: pointer; background: #f9f9f9; color: #555; font-weight: 500; }
  .btn:hover { background: #eee; }
  .btn-save { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-save:hover { opacity: 0.85; }
  .btn-practice { background: #1a56db; color: #fff; border-color: #1a56db; }
  .btn-practice:hover { opacity: 0.85; }
  .btn-open { background: #555; color: #fff; border-color: #555; }
  .btn-open:hover { opacity: 0.85; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  th { text-align: left; padding: 8px 10px; background: #f5f5f5; border-bottom: 2px solid #ddd; font-size: 13px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  th.col-play { width: 32px; }
  th.col-drag { width: 28px; }
  th.col-time { width: 110px; }
  th.col-del { width: 36px; }
  .time-cell { display: flex; align-items: center; gap: 2px; }
  .time-arrows { display: flex; flex-direction: column; }
  .time-arrow { background: none; border: none; cursor: pointer; font-size: 10px; color: #999; padding: 0 4px; line-height: 1.1; }
  .time-arrow:hover { color: #1a56db; }
  .playhead-cell { text-align: center; cursor: pointer; padding: 4px; }
  .playhead-cell:hover { background: #eef3ff; border-radius: 4px; }
  .playhead-icon { font-size: 18px; color: #ccc; }
  .playhead-icon.active { color: #1a56db; }
  td { padding: 2px; border-bottom: 1px solid #eee; vertical-align: middle; }
  td input { width: 100%; border: 1px solid transparent; padding: 7px 8px; font-size: 14px; font-family: inherit; border-radius: 4px; }
  td input:focus { border-color: #a0b4f0; outline: none; background: #f8faff; }
  td input.time-input { width: 60px; text-align: center; }
  .del-btn, .add-row-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #ccc; padding: 4px 8px; border-radius: 4px; }
  .del-btn:hover { color: #c0392b; background: #fdf0f0; }
  .add-row-btn:hover { color: #27ae60; background: #f0fdf4; }
  th.col-actions { width: 56px; }
  .drag-handle { cursor: grab; color: #bbb; font-size: 16px; padding: 4px 6px; user-select: none; }
  .drag-handle:active { cursor: grabbing; }
  tr.dragging { opacity: 0.4; }
  tr.drag-over td { border-top: 2px solid #1a56db; }
  .total-row { display: flex; align-items: center; gap: 12px; margin-bottom: 0.75rem; }
  .total-label { font-size: 14px; color: #555; font-weight: 500; }
  .total-value { font-size: 22px; font-weight: 700; min-width: 50px; }
  .total-unit { font-size: 13px; color: #888; }
  .scale-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .scale-row input[type=range] { flex: 1; }
  .scale-label { font-size: 12px; color: #888; min-width: 28px; }
  .status { font-size: 12px; color: #888; margin-top: 0.5rem; }
  .editor-title { margin: 0 0 1rem; font-size: 20px; font-weight: 600; width: 100%; border: none; border-bottom: 2px solid transparent; background: transparent; outline: none; padding: 2px 0; color: inherit; font-family: inherit; border-radius: 0; }
  .editor-title:hover { border-bottom-color: #c0ccee; }
  .editor-title:focus { border-bottom-color: #7090e0; }

  /* Practice panel */
  .practice-panel {
    flex: 1; min-width: 340px; background: #f8f9fb; border-left: 1px solid #e0e0e0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem; position: relative;
  }
  .practice-panel.active { display: flex; }
  .practice-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
  .practice-close:hover { color: #333; }
  .practice-activity { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 1.5rem; line-height: 1.2; }
  .practice-index { font-size: 13px; color: #999; margin-bottom: 0.5rem; }
  .timer-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 1.5rem; }
  .timer-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: #e0e0e0; stroke-width: 14; transition: stroke 0.3s; }
  .timer-fg { fill: none; stroke: #1a56db; stroke-width: 14; stroke-linecap: round; transition: stroke 0.3s; }
  .timer-fg.done { stroke: #e74c3c; }
  .timer-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 600; }
  @keyframes throb { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .timer-wrap.throb .timer-bg { stroke: #e74c3c; animation: throb 1.5s ease-in-out infinite; }
  .timer-wrap.throb .timer-fg { stroke: #e74c3c; animation: throb 1.5s ease-in-out infinite; }
  .timer-wrap.throb .timer-text { animation: throb 1.5s ease-in-out infinite; color: #e74c3c; }
  .practice-controls { display: flex; gap: 12px; }
  .pbtn { padding: 10px 28px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .pbtn-go { background: #27ae60; color: #fff; }
  .pbtn-go:hover { opacity: 0.85; }
  .pbtn-pause { background: #f39c12; color: #fff; }
  .pbtn-pause:hover { opacity: 0.85; }
  .pbtn-next { background: #1a1a1a; color: #fff; }
  .pbtn-next:hover { opacity: 0.85; }
  .pbtn-restart { background: #888; color: #fff; }
  .pbtn-restart:hover { opacity: 0.85; }
  .session-timer { margin-top: 1.5rem; font-size: 13px; color: #999; }
  .session-timer span { font-weight: 600; font-size: 15px; color: #666; }
  .practice-done { font-size: 28px; font-weight: 700; color: #27ae60; }

  /* ---- Chord Grid ---- */
  .chord-toggle-btn { display: block; margin: 0.6rem auto 0; padding: 3px 16px; font-size: 12px; background: #e8ecf8; border: 1px solid #c0ccee; border-radius: 12px; color: #556; cursor: pointer; letter-spacing: 0.04em; }
  .chord-toggle-btn.active { background: #c8d4f8; border-color: #8899dd; color: #223; }
  .chord-section { margin-top: 1rem; display: none; }
  .chord-section.visible { display: block; }
  .chord-section-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 4px; }
  .key-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
  .piano-svg { display: block; width: 100%; margin-top: 0.25rem; }
  .chord-grid-panel { display: none; margin-top: 1rem; }
  .chord-grid-panel.visible { display: block; }
  .chord-grid-selected-key { font-size: 11px; color: #888; margin-bottom: 6px; text-align: center; }
  .chord-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .chord-cell { background: #f0f4ff; border: 1.5px solid #c8d8f8; border-radius: 10px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; color: #1a3060; cursor: default; transition: background 0.2s, border-color 0.2s; }
  .chord-cell.active { background: #fff9c4; border-color: #f0c040; box-shadow: 0 0 8px 2px rgba(240,192,0,0.3); }
</style>
</head>
<body>

<!-- LEFT: Metronome -->
<div class="metro-panel">
  <div class="beat-row" id="beatRow"></div>
  <div class="bpm-display">
    <div class="bpm-num" id="bpmNum">120</div>
    <div class="bpm-label">BPM</div>
    <input class="bpm-input" type="number" id="bpmInput" min="30" max="240" value="120">
  </div>
  <div class="slider-row">
    <span class="slider-label">30</span>
    <input type="range" min="30" max="240" value="120" step="1" id="bpmSlider">
    <span class="slider-label">240</span>
  </div>
  <div class="vol-row">
    <i class="ti ti-volume vol-icon"></i>
    <input type="range" min="0" max="100" value="80" step="1" id="volSlider">
    <i class="ti ti-volume-2 vol-icon"></i>
  </div>
  <div class="time-sig-row" id="timeRow">
    <button class="time-btn active" data-beats="4">4/4</button>
    <button class="time-btn" data-beats="3">3/4</button>
    <button class="time-btn" data-beats="2">2/2</button>
  </div>
  <hr class="metro-divider">
  <div class="metro-actions">
    <button class="adj-btn minus" id="minusBtn">-10</button>
    <button class="play-btn" id="playBtn">Start</button>
    <button class="adj-btn plus" id="plusBtn">+10</button>
  </div>
  <button class="chord-toggle-btn" id="chordToggleBtn">chord grid</button>

  <div class="chord-section" id="chordSection">
    <div class="chord-section-label">Chord Grid</div>
    <div id="keyButtons"></div>
    <div class="chord-grid-panel" id="chordGridPanel">
      <div class="chord-grid" id="chordGrid"></div>
    </div>
  </div>
</div>

<!-- RIGHT -->
<div class="right-panel">

  <!-- Sets list (start state) -->
  <div class="sets-panel" id="setsPanel">
    <h2>Practice Sets</h2>
    <ul class="set-list" id="setList"></ul>
    <div id="setsEmpty" class="sets-empty" style="display:none">No practice sets found</div>
    <button class="btn btn-save" id="openSetBtn" disabled>Open</button>
  </div>

  <!-- Editor + Practice (hidden until a set is opened) -->
  <div class="editor-wrap" id="editorWrap">
    <div class="editor-panel">
      <input class="editor-title" id="editorTitle" type="text" value="Practice Set" spellcheck="false">
      <div class="toolbar">
        <button class="btn btn-practice" id="practiceBtn">Start Practice</button>
        <button class="btn btn-save" id="saveBtn">Save</button>
        <button class="btn" id="dupBtn">Duplicate</button>

        <button class="btn btn-open" id="backBtn">Open</button>
      </div>
      <div class="total-row">
        <span class="total-label">Total practice time:</span>
        <span class="total-value" id="totalValue">0</span>
        <span class="total-unit">min</span>
      </div>
      <div class="scale-row">
        <span class="scale-label">1</span>
        <input type="range" min="1" max="240" value="1" step="1" id="scaleSlider">
        <span class="scale-label">240</span>
      </div>
      <table>
        <thead><tr><th class="col-play" id="thPlay" style="display:none"></th><th class="col-drag"></th><th>Activity</th><th class="col-time">Time</th><th class="col-actions"></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="status" id="status"></div>
    </div>

    <div class="practice-panel" id="practicePanel">
      <button class="practice-close" id="practiceClose" title="Close practice">×</button>
      <div class="practice-index" id="practiceIndex"></div>
      <div class="practice-activity" id="practiceActivity"></div>
      <div class="timer-wrap" id="timerWrap">
        <svg viewBox="0 0 100 100">
          <circle class="timer-bg" cx="50" cy="50" r="43"/>
          <circle class="timer-fg" id="timerFg" cx="50" cy="50" r="43"/>
        </svg>
        <div class="timer-text" id="timerText">0:00</div>
      </div>
      <div class="practice-controls" id="practiceControls">
        <button class="pbtn pbtn-go" id="goBtn">Go</button>
        <button class="pbtn pbtn-pause" id="pauseBtn" style="display:none">Pause</button>
        <button class="pbtn pbtn-restart" id="restartBtn">Restart</button>
        <button class="pbtn pbtn-next" id="nextBtn">Next</button>
      </div>
      <div class="practice-done" id="practiceDone" style="display:none">Practice Complete!</div>
      <div class="session-timer">Session: <span id="sessionTime">0:00</span></div>
    </div>
  </div>

</div>

<script>
(function() {

  // ===================== METRONOME =====================
  let bpm = 120, beatsPerBar = 4, currentBeat = -1, metroInterval = null, metroRunning = false, audioCtx = null, volume = 0.8;
  const bpmNum = document.getElementById('bpmNum'), bpmInput = document.getElementById('bpmInput');
  const bpmSlider = document.getElementById('bpmSlider'), volSlider = document.getElementById('volSlider');
  const beatRow = document.getElementById('beatRow'), playBtn = document.getElementById('playBtn');

  function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
  let tickBuf = null, tockBuf = null;
  async function loadSamples() {
    const ctx = getCtx();
    const [tickResp, tockResp] = await Promise.all([fetch('tick.wav'), fetch('tock.wav')]);
    tickBuf = await ctx.decodeAudioData(await tickResp.arrayBuffer());
    tockBuf = await ctx.decodeAudioData(await tockResp.arrayBuffer());
  }
  function playTick(isAccent) {
    const ctx = getCtx();
    const buf = isAccent ? tickBuf : tockBuf;
    if (!buf) return;
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    src.buffer = buf;
    src.connect(gain); gain.connect(ctx.destination);
    gain.gain.value = volume;
    src.start(ctx.currentTime);
  }
  function buildDots() {
    beatRow.innerHTML = '';
    for (let i = 0; i < beatsPerBar; i++) { const d = document.createElement('div'); d.className = 'beat-dot ' + (i === 0 ? 'accent' : 'normal'); d.id = 'dot' + i; beatRow.appendChild(d); }
  }
  function lightBeat(idx) {
    for (let i = 0; i < beatsPerBar; i++) { const d = document.getElementById('dot' + i); if (d) d.className = 'beat-dot ' + (i === 0 ? 'accent' : 'normal'); }
    const a = document.getElementById('dot' + idx); if (a) a.className = 'beat-dot ' + (idx === 0 ? 'lit-accent' : 'lit-normal');
  }
  function metroTick() {
    currentBeat = (currentBeat + 1) % beatsPerBar;
    lightBeat(currentBeat);
    playTick(currentBeat === 0);
    if (chordGridActive) {
      if (chordCountIn > 0) {
        chordCountIn--;
      } else if (currentBeat === 0) {
        if (!chordStarted) {
          chordStarted = true;
          highlightChordCell(chordIdx);
        } else {
          chordIdx = (chordIdx + 1) % chordCells.length;
          highlightChordCell(chordIdx);
        }
      }
    }
  }
  function metroStartStop() {
    if (metroRunning) {
      clearInterval(metroInterval); metroRunning = false; playBtn.textContent = 'Start';
      for (let i = 0; i < beatsPerBar; i++) { const d = document.getElementById('dot' + i); if (d) d.className = 'beat-dot ' + (i === 0 ? 'accent' : 'normal'); }
      currentBeat = -1;
      // leave chordIdx and highlight in place — paused on current square
    } else {
      metroRunning = true; playBtn.textContent = 'Stop'; currentBeat = -1;
      if (!tickBuf) loadSamples();
      metroInterval = setInterval(metroTick, 60000 / bpm);
      if (chordGridActive && chordCells.length > 0) { highlightChordCell(-1); chordCountIn = 4; chordStarted = false; }
    }
  }
  function updateBpm(val) {
    val = Math.max(30, Math.min(240, Math.round(val))); bpm = val; bpmNum.textContent = val; bpmInput.value = val; bpmSlider.value = val;
    if (metroRunning) { clearInterval(metroInterval); metroInterval = setInterval(metroTick, 60000 / bpm); }
  }
  buildDots();
  bpmSlider.addEventListener('input', () => updateBpm(parseInt(bpmSlider.value)));
  bpmInput.addEventListener('change', () => updateBpm(parseInt(bpmInput.value)));
  bpmInput.addEventListener('keydown', e => { if (e.key === 'Enter') updateBpm(parseInt(bpmInput.value)); });
  volSlider.addEventListener('input', () => { volume = parseInt(volSlider.value) / 100; });
  document.getElementById('minusBtn').addEventListener('click', () => updateBpm(bpm - 10));
  document.getElementById('plusBtn').addEventListener('click', () => updateBpm(bpm + 10));
  playBtn.addEventListener('click', metroStartStop);
  // ===================== CHORD GRID =====================
  const CHORD_DATA = {
    C:  ['C','Dm','Em','F','G','Am','Bdim','C','F','G','Am','C'],
    Db: ['Db','Ebm','Fm','F#','Ab','Bbm','Cdim','Db','F#','Ab','Bbm','Db'],
    D:  ['D','Em','F#m','G','A','Bm','Dbdim','D','G','A','Bm','D'],
    Eb: ['Eb','Fm','Gm','Ab','Bb','Cm','Ddim','Eb','Ab','Bb','Cm','Eb'],
    E:  ['E','F#m','Abm','A','B','Dbm','Ebdim','E','A','B','Dbm','E'],
    F:  ['F','Gm','Am','Bb','C','Dm','Edim','F','Bb','C','Dm','F'],
    'F#':['F#','Abm','Bbm','B','Db','Ebm','Fdim','F#','B','Db','Ebm','F#'],
    G:  ['G','Am','Bm','C','D','Em','F#dim','G','C','D','Em','G'],
    Ab: ['Ab','Bbm','Cm','Db','Eb','Fm','Gdim','Ab','Db','Eb','Fm','Ab'],
    A:  ['A','Bm','Dbm','D','E','F#m','Abdim','A','D','E','F#m','A'],
    Bb: ['Bb','Cm','Dm','Eb','F','Gm','Adim','Bb','Eb','F','Gm','Bb'],
    B:  ['B','Dbm','Ebm','E','F#','Abm','Bbdim','B','E','F#','Abm','B'],
  };
  const KEYS = ['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

  let chordGridActive = false, chordIdx = 0, chordCells = [], chordCountIn = 0, chordStarted = false, currentChordKey = null;
  let currentWindowWidth = 660;
  function chordHeight() {
    const section = document.getElementById('chordSection');
    if (!section || !section.classList.contains('visible')) return 760;
    const panel = document.getElementById('chordGridPanel');
    return (panel && panel.classList.contains('visible')) ? 990 : 860;
  }
  function resizeKeepWidth(h) { window.api.resizeWindow(currentWindowWidth, h); }

  function shuffle(arr) {
    const freq = {};
    arr.forEach(x => freq[x] = (freq[x] || 0) + 1);
    const pool = Object.entries(freq).map(([val, count]) => ({ val, count }));
    const result = [];
    let last = null;
    for (let i = 0; i < arr.length; i++) {
      const avail = pool.filter(p => p.count > 0 && p.val !== last);
      const pick = avail[Math.floor(Math.random() * avail.length)];
      result.push(pick.val);
      last = pick.val;
      pick.count--;
    }
    return result;
  }

  function musicalChord(name) {
    return name.replace(/#/g, '♯').replace(/([A-G])b/g, '$1♭');
  }

  function highlightChordCell(idx) {
    chordCells.forEach((c, i) => c.classList.toggle('active', i === idx));
  }

  function showChordGrid(key) {
    currentChordKey = key;
    refreshPiano();
    const chords = shuffle(CHORD_DATA[key]);
    const grid = document.getElementById('chordGrid');
    grid.innerHTML = '';
    chordCells = chords.map((ch, i) => {
      const cell = document.createElement('div');
      cell.className = 'chord-cell';
      cell.textContent = musicalChord(ch);
      cell.style.cursor = 'pointer';
      cell.addEventListener('click', () => {
        highlightChordCell(-1);
        chordIdx = i; chordStarted = false;
        if (metroRunning) { chordCountIn = 4; }
        else { highlightChordCell(i); chordCountIn = 0; chordStarted = true; }
      });
      grid.appendChild(cell);
      return cell;
    });
    const panel = document.getElementById('chordGridPanel');
    if (!panel.classList.contains('visible')) {
      panel.classList.add('visible');
      resizeKeepWidth(990);
    }
    chordGridActive = true; chordIdx = 0; chordStarted = false;
    chordCountIn = metroRunning ? 4 : 0;
    if (!metroRunning) highlightChordCell(0);
  }

  // Build piano key picker
  const PIANO_WHITES = ['C','D','E','F','G','A','B'];
  const PIANO_BLACKS = [{key:'Db',x:26},{key:'Eb',x:71},{key:'F#',x:159},{key:'Ab',x:203},{key:'Bb',x:247}];
  const pianoRects = {};

  function buildPiano() {
    const ns = 'http://www.w3.org/2000/svg';
    const container = document.getElementById('keyButtons');
    container.innerHTML = '';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 308 82');
    svg.setAttribute('class', 'piano-svg');

    PIANO_WHITES.forEach((key, i) => {
      const r = document.createElementNS(ns, 'rect');
      r.setAttribute('x', i*44+1); r.setAttribute('y', 1);
      r.setAttribute('width', 42); r.setAttribute('height', 78);
      r.setAttribute('rx', 3); r.setAttribute('stroke', '#aaa'); r.setAttribute('stroke-width', 1.5);
      r.style.cursor = 'pointer';
      r.addEventListener('mousedown', e => { e.preventDefault(); showChordGrid(key); });
      svg.appendChild(r); pianoRects[key] = r;
    });

    PIANO_BLACKS.forEach(({key, x}) => {
      const r = document.createElementNS(ns, 'rect');
      r.setAttribute('x', x); r.setAttribute('y', 1);
      r.setAttribute('width', 26); r.setAttribute('height', 50);
      r.setAttribute('rx', 2); r.setAttribute('stroke', '#000'); r.setAttribute('stroke-width', 1);
      r.style.cursor = 'pointer';
      r.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); showChordGrid(key); });
      svg.appendChild(r); pianoRects[key] = r;
    });

    container.appendChild(svg);
    refreshPiano();
  }

  function refreshPiano() {
    const blackSet = new Set(['Db','Eb','F#','Ab','Bb']);
    Object.entries(pianoRects).forEach(([key, r]) => {
      const sel = currentChordKey === key;
      r.setAttribute('fill', blackSet.has(key)
        ? (sel ? '#c8a000' : '#1a1a1a')
        : (sel ? '#fff0a0' : 'white'));
    });
  }

  buildPiano();

  document.getElementById('chordToggleBtn').addEventListener('click', () => {
    const section = document.getElementById('chordSection');
    const btn = document.getElementById('chordToggleBtn');
    const showing = section.classList.toggle('visible');
    btn.classList.toggle('active', showing);
    if (showing) {
      resizeKeepWidth(860);
    } else {
      // hide chord grid panel too and deactivate
      document.getElementById('chordGridPanel').classList.remove('visible');
      chordGridActive = false;
      chordCells = [];
      currentChordKey = null;
      refreshPiano();
      resizeKeepWidth(760);
    }
  });

  document.getElementById('timeRow').addEventListener('click', e => {
    const btn = e.target.closest('.time-btn'); if (!btn) return;
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
    beatsPerBar = parseInt(btn.dataset.beats); currentBeat = -1; buildDots();
    if (metroRunning) { clearInterval(metroInterval); metroInterval = setInterval(metroTick, 60000 / bpm); }
  });

  // ===================== SETS LIST =====================
  const setsPanel = document.getElementById('setsPanel');
  const editorWrap = document.getElementById('editorWrap');
  let selectedSetPath = null;

  async function loadSetsList() {
    const sets = await window.api.listSets();
    const list = document.getElementById('setList');
    const empty = document.getElementById('setsEmpty');
    const openBtn = document.getElementById('openSetBtn');
    list.innerHTML = ''; selectedSetPath = null; openBtn.disabled = true;
    if (sets.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    const lastPath = localStorage.getItem('lastOpenedSet');
    for (const s of sets) {
      const li = document.createElement('li'); li.textContent = s.name; li.dataset.path = s.path;
      li.addEventListener('click', () => {
        document.querySelectorAll('.set-list li').forEach(el => el.classList.remove('selected'));
        li.classList.add('selected'); selectedSetPath = s.path; openBtn.disabled = false;
      });
      li.addEventListener('dblclick', () => openSet(s.path));
      list.appendChild(li);
      if (s.path === lastPath) {
        li.classList.add('selected'); selectedSetPath = s.path; openBtn.disabled = false;
      }
    }
  }

  document.getElementById('openSetBtn').addEventListener('click', () => { if (selectedSetPath) openSet(selectedSetPath); });

  async function openSet(fp) {
    setsPanel.style.display = 'none';
    editorWrap.classList.add('active');
    currentWindowWidth = 1200; window.api.resizeWindow(1200, chordHeight());
    localStorage.setItem('lastOpenedSet', fp);
    filePath = fp;
    const data = await window.api.readCSV(fp);
    document.getElementById('editorTitle').value = data.name;
    rows = data.rows;
    renderEditor();
    updateTotal();
    snapshotRatios();
  }

  function showSetsList() {
    stopPracticeTimer();
    practiceActive = false;
    practicePanel.classList.remove('active');
    editorWrap.classList.remove('active');
    setsPanel.style.display = '';
    currentWindowWidth = 660; window.api.resizeWindow(660, chordHeight());
    loadSetsList();
  }

  document.getElementById('backBtn').addEventListener('click', showSetsList);

  loadSetsList();

  // ===================== EDITOR =====================
  let filePath = null, rows = [], practiceActive = false, baseRatios = [];
  const totalValueEl = document.getElementById('totalValue');
  const scaleSlider = document.getElementById('scaleSlider');

  function getTotalMins() { return rows.reduce((sum, r) => sum + (parseFloat(r.time) || 0), 0); }
  function updateTotal() { const t = Math.round(getTotalMins()); totalValueEl.textContent = t; scaleSlider.value = t; }
  function snapshotRatios() { const t = getTotalMins(); baseRatios = rows.map(r => t > 0 ? (parseFloat(r.time) || 0) / t : 0); }

  scaleSlider.addEventListener('input', () => {
    const nt = parseInt(scaleSlider.value);
    if (baseRatios.length !== rows.length) snapshotRatios();
    rows.forEach((r, i) => { r.time = Math.round(baseRatios[i] * nt * 10) / 10; });
    totalValueEl.textContent = Math.round(nt);
    renderEditor();
    syncPracticeTime();
  });

  let dragIdx = null;

  function renderEditor() {
    const tbody = document.getElementById('tbody');
    const thPlay = document.getElementById('thPlay');
    thPlay.style.display = practiceActive ? '' : 'none';
    tbody.innerHTML = '';
    rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      tr.draggable = true; tr.dataset.idx = i;
      tr.addEventListener('dragstart', e => { dragIdx = i; tr.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
      tr.addEventListener('dragend', () => { tr.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); dragIdx = null; });
      tr.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); if (dragIdx !== null && dragIdx !== i) tr.classList.add('drag-over'); });
      tr.addEventListener('dragleave', () => tr.classList.remove('drag-over'));
      tr.addEventListener('drop', e => { e.preventDefault(); tr.classList.remove('drag-over'); if (dragIdx === null || dragIdx === i) return; const moved = rows.splice(dragIdx, 1)[0]; rows.splice(i, 0, moved); dragIdx = null; renderEditor(); });

      if (practiceActive) {
        const tdP = document.createElement('td'); tdP.className = 'playhead-cell';
        const icon = document.createElement('span'); icon.className = 'playhead-icon' + (i === practiceIdx ? ' active' : ''); icon.textContent = i === practiceIdx ? '▶' : '·';
        tdP.appendChild(icon); tdP.addEventListener('click', () => goToItem(i)); tr.appendChild(tdP);
      }

      const tdD = document.createElement('td'); const handle = document.createElement('span'); handle.className = 'drag-handle'; handle.textContent = '⠿'; tdD.appendChild(handle); tr.appendChild(tdD);
      const tdA = document.createElement('td'); const inA = document.createElement('input'); inA.type = 'text'; inA.value = row.activity; inA.addEventListener('input', () => { rows[i].activity = inA.value; }); tdA.appendChild(inA); tr.appendChild(tdA);

      const tdT = document.createElement('td');
      const tc = document.createElement('div'); tc.className = 'time-cell';
      const inT = document.createElement('input'); inT.type = 'text'; inT.className = 'time-input'; inT.value = row.time;
      inT.addEventListener('input', () => { rows[i].time = inT.value; updateTotal(); snapshotRatios(); syncPracticeTime(); });
      const arrows = document.createElement('div'); arrows.className = 'time-arrows';
      const up = document.createElement('button'); up.className = 'time-arrow'; up.textContent = '▲';
      up.addEventListener('click', () => { rows[i].time = Math.max(0, (parseFloat(rows[i].time) || 0) + 1); updateTotal(); snapshotRatios(); renderEditor(); syncPracticeTime(); });
      const dn = document.createElement('button'); dn.className = 'time-arrow'; dn.textContent = '▼';
      dn.addEventListener('click', () => { rows[i].time = Math.max(0, (parseFloat(rows[i].time) || 0) - 1); updateTotal(); snapshotRatios(); renderEditor(); syncPracticeTime(); });
      arrows.appendChild(up); arrows.appendChild(dn); tc.appendChild(inT); tc.appendChild(arrows); tdT.appendChild(tc); tr.appendChild(tdT);

      const tdActs = document.createElement('td');
      const addR = document.createElement('button'); addR.className = 'add-row-btn'; addR.textContent = '+'; addR.title = 'Add row below';
      addR.addEventListener('click', () => { rows.splice(i + 1, 0, { activity: '', time: '' }); renderEditor(); updateTotal(); snapshotRatios(); const inp = document.querySelectorAll('#tbody tr')[i + 1]?.querySelector('input'); if (inp) inp.focus(); });
      const del = document.createElement('button'); del.className = 'del-btn'; del.textContent = '×'; del.title = 'Delete row';
      del.addEventListener('click', () => { rows.splice(i, 1); renderEditor(); updateTotal(); snapshotRatios(); });
      tdActs.appendChild(addR); tdActs.appendChild(del); tr.appendChild(tdActs);

      tbody.appendChild(tr);
    });
  }


  const titleInput = document.getElementById('editorTitle');
  async function commitRename() {
    const newName = titleInput.value.trim();
    if (!newName || !filePath) return;
    const currentName = filePath.split('/').pop().replace('.csv', '');
    if (newName === currentName) return;
    try {
      const newPath = await window.api.renameCSV(filePath, newName);
      filePath = newPath;
      document.getElementById('status').textContent = 'Renamed.';
      setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000);
    } catch (err) {
      titleInput.value = currentName;
      document.getElementById('status').textContent = err.message || 'Rename failed.';
      setTimeout(() => { document.getElementById('status').textContent = ''; }, 3000);
    }
  }
  titleInput.addEventListener('blur', commitRename);
  titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleInput.blur(); } if (e.key === 'Escape') { titleInput.value = filePath ? filePath.split('/').pop().replace('.csv','') : ''; titleInput.blur(); } });

  document.getElementById('saveBtn').addEventListener('click', async () => { await window.api.saveCSV(filePath, rows); document.getElementById('status').textContent = 'Saved.'; setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000); });
  document.getElementById('dupBtn').addEventListener('click', async () => {
    const newPath = await window.api.duplicateCSV(filePath, rows);
    filePath = newPath;
    const name = newPath.split('/').pop().replace('.csv', '');
    document.getElementById('editorTitle').value = name;
    document.getElementById('status').textContent = 'Duplicated as ' + name;
    setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000);
  });

  // ===================== PRACTICE =====================
  const CIRC = 2 * Math.PI * 43;
  let practiceIdx = 0, totalSec = 0, remainSec = 0, timerId = null;
  let sessionTimerId = null, sessionElapsed = 0, sessionStarted = false;
  const practicePanel = document.getElementById('practicePanel');
  const timerFg = document.getElementById('timerFg'), timerText = document.getElementById('timerText'), timerWrap = document.getElementById('timerWrap');
  const activityEl = document.getElementById('practiceActivity'), indexEl = document.getElementById('practiceIndex');
  const goBtn = document.getElementById('goBtn'), pauseBtn = document.getElementById('pauseBtn'), nextBtn = document.getElementById('nextBtn');
  const restartBtn = document.getElementById('restartBtn');
  const doneEl = document.getElementById('practiceDone'), controlsEl = document.getElementById('practiceControls');
  const sessionTimeEl = document.getElementById('sessionTime');
  timerFg.setAttribute('stroke-dasharray', CIRC);

  function startSessionTimer() {
    sessionElapsed = 0; sessionTimeEl.textContent = '0:00';
    if (sessionTimerId) clearInterval(sessionTimerId);
    sessionTimerId = setInterval(() => { sessionElapsed++; sessionTimeEl.textContent = fmtTime(sessionElapsed); }, 1000);
  }
  function stopSessionTimer() { if (sessionTimerId) { clearInterval(sessionTimerId); sessionTimerId = null; } }

  function fmtTime(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }
  function updateCircle() {
    const frac = totalSec > 0 ? remainSec / totalSec : 0;
    timerFg.setAttribute('stroke-dashoffset', CIRC * (1 - frac));
    if (remainSec <= 0 && totalSec > 0) { timerFg.classList.add('done'); timerWrap.classList.add('throb'); }
    else { timerFg.classList.remove('done'); timerWrap.classList.remove('throb'); }
    timerText.textContent = fmtTime(Math.max(0, remainSec));
  }
  function syncPracticeTime() {
    if (!practiceActive || practiceIdx >= rows.length) return;
    const newTotal = Math.round((parseFloat(rows[practiceIdx].time) || 0) * 60);
    if (newTotal === totalSec) return;
    const elapsed = totalSec - remainSec;
    totalSec = newTotal;
    remainSec = Math.max(0, newTotal - elapsed);
    updateCircle();
  }

  function loadPracticeItem(idx, autoStart) {
    stopPracticeTimer(); practiceIdx = idx; renderEditor();
    if (idx >= rows.length) { activityEl.style.display = 'none'; indexEl.style.display = 'none'; timerWrap.style.display = 'none'; controlsEl.style.display = 'none'; doneEl.style.display = 'block'; return; }
    activityEl.style.display = ''; indexEl.style.display = ''; timerWrap.style.display = ''; controlsEl.style.display = 'flex'; doneEl.style.display = 'none';
    const row = rows[idx]; activityEl.textContent = row.activity; indexEl.textContent = (idx + 1) + ' of ' + rows.length;
    const mins = parseFloat(row.time) || 0; totalSec = Math.round(mins * 60); remainSec = totalSec;
    goBtn.style.display = ''; pauseBtn.style.display = 'none'; updateCircle();
    if (autoStart) startPracticeTimer();
  }
  function playChime() {
    const ctx = getCtx(), t = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.15);
      gain.gain.setValueAtTime(0, t);
      gain.gain.setValueAtTime(0.25, t + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 1.2);
      osc.start(t + i * 0.15);
      osc.stop(t + i * 0.15 + 1.3);
    });
  }
  function goToItem(idx) { loadPracticeItem(idx, true); }
  function startPracticeTimer() {
    if (timerId) return;
    if (!sessionStarted) { sessionStarted = true; startSessionTimer(); }
    goBtn.style.display = 'none'; pauseBtn.style.display = '';
    timerId = setInterval(() => { if (remainSec > 0) { remainSec--; updateCircle(); if (remainSec <= 0) { playChime(); } } else { stopPracticeTimer(); pauseBtn.style.display = 'none'; goBtn.style.display = 'none'; } }, 1000);
  }
  function stopPracticeTimer() { if (timerId) { clearInterval(timerId); timerId = null; } goBtn.style.display = ''; pauseBtn.style.display = 'none'; }

  goBtn.addEventListener('click', startPracticeTimer);
  pauseBtn.addEventListener('click', stopPracticeTimer);
  restartBtn.addEventListener('click', () => loadPracticeItem(practiceIdx, true));
  nextBtn.addEventListener('click', () => loadPracticeItem(practiceIdx + 1, true));

  document.getElementById('practiceBtn').addEventListener('click', () => {
    if (rows.length === 0) return;
    practiceActive = true; practicePanel.classList.add('active');
    currentWindowWidth = 1280; window.api.resizeWindow(1280, chordHeight());
    sessionStarted = false;
    sessionElapsed = 0; sessionTimeEl.textContent = '0:00';
    loadPracticeItem(0);
  });
  document.getElementById('practiceClose').addEventListener('click', () => {
    stopPracticeTimer(); stopSessionTimer();
    practiceActive = false; practicePanel.classList.remove('active');
    renderEditor(); currentWindowWidth = 1200; window.api.resizeWindow(1200, chordHeight());
  });

})();
</script>
</body>
</html>
